<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Server OS - Bento Pro</title>
  <style>
    :root {
      --bg-color: #f2f2f7;
      --card-bg: #ffffff;
      --text-main: #1c1c1e;
      --text-muted: #8e8e93;
      --border-color: rgba(0, 0, 0, 0.04);
      --btn-orange: #fff4e5;
      --btn-red: #ffe9e8;
      --btn-blue: #e5f1ff;
      --btn-gray: #f2f2f7;
      --accent-blue: #007aff;
      --accent-green: #34c759;
      --accent-orange: #ff9500;
      --accent-red: #ff3b30;
      --radius-lg: 32px;
      --radius-md: 20px;
      --radius-sm: 12px;
      --fit-scale: 0.82;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-color);
      color: var(--text-main);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .stage {
      width: 1060px;
      height: 580px;
      transform: scale(var(--fit-scale));
      transform-origin: center center;
      flex: 0 0 auto;
    }

    .bento-container {
      width: 1060px;
      height: 580px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 180px;
      gap: 20px;
    }

    .bento-box {
      min-width: 0;
      min-height: 0;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.02);
      overflow: hidden;
    }

    .span-2-col { grid-column: span 2; }
    .span-2-row { grid-row: span 2; }

    .box-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: auto;
    }

    .box-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .box-icon svg {
      width: 24px;
      height: 24px;
      display: block;
      fill: currentColor;
    }

    .box-title {
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .box-value {
      color: var(--text-main);
      font-size: 26px;
      line-height: 1.08;
      font-weight: 750;
      letter-spacing: 0;
      word-break: break-word;
    }

    .live-state {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 650;
      white-space: nowrap;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background: var(--accent-green);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 12px var(--accent-green);
    }

    .live-dot.warn {
      background: var(--accent-orange);
      box-shadow: 0 0 12px var(--accent-orange);
    }

    .live-dot.bad {
      background: var(--accent-red);
      box-shadow: 0 0 12px var(--accent-red);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.ok {
      background: var(--accent-green);
      box-shadow: 0 0 10px rgba(52, 199, 89, 0.55);
    }

    .status-dot.bad {
      background: var(--accent-red);
      box-shadow: 0 0 10px rgba(255, 59, 48, 0.5);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      font-family: Consolas, "SF Mono", monospace;
      white-space: nowrap;
    }

    .list-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .list-item {
      min-height: 45px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 650;
    }

    .list-item span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      height: 100%;
    }

    .btn-bento {
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 800;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      padding: 18px;
      transition: transform 0.16s ease, filter 0.16s ease;
    }

    .btn-bento:active {
      transform: scale(0.94);
      filter: brightness(0.92);
    }

    .btn-bento.confirming {
      outline: 3px solid currentColor;
      outline-offset: -5px;
      filter: saturate(1.18);
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 900;
    }

    .btn-label {
      color: var(--text-main);
      line-height: 1.1;
    }

    .storage-row {
      display: flex;
      gap: 30px;
      margin-top: auto;
    }

    .storage-label {
      margin-bottom: 4px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .storage-value {
      font-size: 15px;
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 16px;
      z-index: 20;
      max-width: min(520px, calc(100vw - 32px));
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(28, 28, 30, 0.92);
      color: #fff;
      font-size: 14px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

  <div class="stage">
    <div class="bento-container">
      <section class="bento-box span-2-col" style="justify-content:center;">
        <div class="box-header">
          <div class="box-icon" style="background:rgba(0,0,0,0.05);"><svg><use href="#i-cpu"></use></svg></div>
          <div class="live-state"><span id="live-dot" class="live-dot"></span><span id="server-status">Online</span></div>
        </div>
        <div class="box-value" style="font-size:40px;margin-top:10px;">DevBoard<br>Server</div>
      </section>

      <section class="bento-box">
        <div class="box-header">
          <div class="box-icon" style="background:var(--btn-blue);color:var(--accent-blue);"><svg><use href="#i-globe"></use></svg></div>
          <span id="nginx-check" class="status-dot"></span>
        </div>
        <div class="box-title" style="margin-top:auto;">wlan0 / Tunnel</div>
        <div id="network-value" class="box-value" style="font-size:19px;">127.0.0.1</div>

        <div class="box-header">

        </div>
        <div class="box-title" style="margin-top:auto;">eth0 / Direct</div>
        <div id="direct-value" class="box-value" style="font-size:19px;">192.168.50.1</div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const API_BASE = location.protocol === "file:" ? "http://127.0.0.1" : "";
    const DESIGN_WIDTH = 1060;
    const DESIGN_HEIGHT = 580;
    const pendingConfirm = new Map();

    const $ = (id) => document.getElementById(id);

    function fitStage() {
      const margin = 16;
      const scale = Math.min(
        1,
        (window.innerWidth - margin) / DESIGN_WIDTH,
        (window.innerHeight - margin) / DESIGN_HEIGHT
      );
      document.documentElement.style.setProperty("--fit-scale", String(Math.max(0.45, scale)));
    }

    function toast(message) {
      const el = $("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.remove("show"), 2400);
    }

    function requireSecondTap(button, key, label, timeout = 3600) {
      const now = Date.now();
      const pending = pendingConfirm.get(key);
      if (pending && now < pending.expiresAt) {
        clearTimeout(pending.timer);
        pendingConfirm.delete(key);
        button.classList.remove("confirming");
        return true;
      }

      button.classList.add("confirming");
      toast(`再次点击确认${label}`);
      const timer = setTimeout(() => {
        pendingConfirm.delete(key);
        button.classList.remove("confirming");
      }, timeout);
      pendingConfirm.set(key, { expiresAt: now + timeout, timer });
      return false;
    }

    async function api(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        cache: "no-store",
        credentials: "include",
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options
      });
      const contentType = response.headers.get("content-type") || "";
      const payload = contentType.includes("application/json") ? await response.json() : await response.text();
      if (!response.ok) {
        const message = payload && typeof payload === "object" && payload.error ? payload.error : `请求失败 ${response.status}`;
        throw new Error(message);
      }
      return payload;
    }

    function setTag(el, text, tone = "gray") {
      el.textContent = text;
      if (tone === "green") {
        el.style.background = "var(--accent-green)";
        el.style.color = "#fff";
      } else if (tone === "red") {
        el.style.background = "var(--accent-red)";
        el.style.color = "#fff";
      } else {
        el.style.background = "var(--bg-color)";
        el.style.color = "var(--text-main)";
      }
    }

    function setDot(el, tone = "gray") {
      el.classList.remove("ok", "bad");
      if (tone === "green") el.classList.add("ok");
      if (tone === "red") el.classList.add("bad");
    }

    function readOnlineStatus(data) {
      if (!data || typeof data !== "object") return null;
      for (const key of ["online", "oline", "ssh_online", "reachable", "is_online", "connected"]) {
        if (typeof data[key] === "boolean") return data[key];
      }
      for (const key of ["data", "device", "workstation", "result"]) {
        const nested = readOnlineStatus(data[key]);
        if (nested !== null) return nested;
      }
      const status = String(data.status || data.state || "").toLowerCase();
      if (["online", "up", "ok", "reachable", "connected", "running"].includes(status)) return true;
      if (["offline", "down", "failed", "unreachable", "disconnected", "stopped"].includes(status)) return false;
      const text = JSON.stringify(data);
      if (["在线", "可达", "成功", "SSH在线"].some((token) => text.includes(token))) return true;
      if (["离线", "不可达", "失败", "SSH离线"].some((token) => text.includes(token))) return false;
      return typeof data.ok === "boolean" ? data.ok : null;
    }

    function getDeviceHost(device, status) {
      return device?.host || device?.ip || device?.hostname || device?.ssh_host ||
        status?.host || status?.ip || status?.hostname || status?.ssh_host || "未配置";
    }

    function getDevicePort(device, status) {
      return device?.ssh_port || device?.port || status?.ssh_port || status?.port || 22;
    }

    function setServerState(text, tone = "good") {
      const dot = $("live-dot");
      dot.classList.remove("warn", "bad");
      if (tone === "warn") dot.classList.add("warn");
      if (tone === "bad") dot.classList.add("bad");
      $("server-status").textContent = text;
    }

    async function loadDevice() {
      try {
        const [device, status] = await Promise.all([
          api("/api/device/workstation"),
          api("/api/device/workstation/status")
        ]);
        const online = readOnlineStatus(status);
        const host = getDeviceHost(device, status);
        const port = getDevicePort(device, status);
        $("pc-state").textContent = online === true ? "在线" : online === false ? "离线" : "未知";
        $("direct-value").textContent = host === "未配置" ? "192.168.50.1" : host;
        setDot($("device-check"), online === true ? "green" : online === false ? "red" : "gray");
        setServerState(online === false ? "Workstation Offline" : "Online", online === false ? "warn" : "good");
      } catch (error) {
        $("pc-state").textContent = "读取失败";
        setDot($("device-check"), "red");
        setServerState("API Error", "bad");
      }
    }

    async function loadApiState() {
      try {
        await api("/api/device/workstation/status");
        setTag($("api-state"), "ACTIVE", "green");
        setDot($("nginx-check"), "green");
      } catch {
        setTag($("api-state"), "ERROR", "red");
        setDot($("nginx-check"), "red");
      }
    }

    async function loadSync() {
      try {
        const data = await api("/api/syncthing/status");
        $("sync-state").textContent = typeof data === "object" ? (data.status || data.state || "已读取") : String(data);
      } catch {
        $("sync-state").textContent = "读取失败";
      }
    }

    async function refreshAll(showMessage = false) {
      await Promise.allSettled([loadApiState(), loadDevice(), loadSync()]);
      if (showMessage) toast("状态已刷新");
    }

    async function wakePc() {
      if (!requireSecondTap($("wake-btn"), "wake", "唤醒电脑")) return;
      try {
        await api("/api/device/workstation/wake", { method: "POST", body: "{}" });
        toast("唤醒命令已发送");
        setTimeout(loadDevice, 1200);
      } catch (error) {
        toast(error.message);
      }
    }

    async function shutdownPc() {
      if (!requireSecondTap($("shutdown-btn"), "shutdown", "关闭电脑")) return;
      try {
        await api("/api/device/workstation/shutdown", { method: "POST", body: "{}" });
        toast("关机命令已发送");
        setTimeout(loadDevice, 1200);
      } catch (error) {
        toast(error.message);
      }
    }

    window.addEventListener("resize", fitStage);
    $("wake-btn").addEventListener("click", wakePc);
    $("shutdown-btn").addEventListener("click", shutdownPc);
    $("refresh-btn").addEventListener("click", () => refreshAll(true));
    $("sync-btn").addEventListener("click", async () => {
      await loadSync();
      toast("同步状态已刷新");
    });

    fitStage();
    refreshAll();
    setInterval(refreshAll, 15000);
  </script>
</body>
</html>
